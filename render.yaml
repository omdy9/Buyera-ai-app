services:
  - type: web
    name: buyera-ai-backend
    runtime: python
    rootDir: .
    buildCommand: "pip install --upgrade pip && pip install -r requirements_backend.txt"
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: deepseek
    healthCheckPath: /
    autoDeploy: true
