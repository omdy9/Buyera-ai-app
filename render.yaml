services:
  # ── Python / FastAPI backend ──────────────────────────────────────────────
  - type: web
    name: buyera-ai-backend
    runtime: python
    rootDir: .
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements_backend.txt &&
      python -m spacy download en_core_web_sm
    startCommand: >
      python -m uvicorn backend.main:app
      --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: MONGO_URI
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: deepseek
      - key: NODE_CRAWLER_URL
        value: http://127.0.0.1:5050
    healthCheckPath: /
    autoDeploy: true

  # ── Node.js crawler sidecar ───────────────────────────────────────────────
  - type: worker
    name: buyera-node-crawler
    runtime: node
    rootDir: crawler
    buildCommand: npm install
    startCommand: node index.js
    envVars: []
